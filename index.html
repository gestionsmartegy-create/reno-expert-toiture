<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Réno-Expert Toiture</title>
<script>
  var lang = navigator.language || navigator.userLanguage || 'fr';
  if (lang.toLowerCase().indexOf('fr') === 0) {
    window.location.replace('/fr');
  } else {
    window.location.replace('/en');
  }
</script>
<noscript>
  <meta http-equiv="refresh" content="0;url=/fr">
</noscript>
</head>
<body>
  <p><a href="/fr">Français</a> | <a href="/en">English</a></p>
</body>
</html>
